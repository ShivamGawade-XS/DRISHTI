services:
  - type: web
    name: drishti-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    # Add a persistent disk to preserve the SQLite database across restarts
    disk:
      name: data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
